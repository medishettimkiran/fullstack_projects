<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form & Datastorage</title>
    <link rel="stylesheet" href="Task1.css">
</head>
<body>

<form id="form">
    <table>
        <h1>STUDENT REGISTRATION FORM</h1>

        <tr>
            <td><label>Name:</label></td>
            <td><input id="name" type="text" placeholder="Enter Your Name..." required></td>
        </tr>

        <tr>
            <td><label>E-mail:</label></td>
            <td><input id="email" type="email" placeholder="Enter Your Email..." required></td>
        </tr>

        <tr>
            <td><label>Date of Birth:</label></td>
            <td><input id="dob" type="date" required></td>
        </tr>

        <tr>
            <td><label>Department:</label></td>
            <td>
                <select id="dept" required>
                    <option value="">Select</option>
                    <option value="CSE">CSE</option>
                    <option value="ECE">ECE</option>
                    <option value="EEE">EEE</option>
                    <option value="MECHANICAL">MECHANICAL</option>
                    <option value="CSE(AI&ML)">CSE(AI&ML)</option>
                    <option value="B.COM">B.COM</option>
                </select>
            </td>
        </tr>

        <tr>
            <td><label>Phone Number:</label></td>
            <td><input id="number" type="text" placeholder="Enter Mobile Number..." required></td>
        </tr>

        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio" name="gender" value="Male" required> Male
                <input type="radio" name="gender" value="Female" required> Female
            </td>
        </tr>

        <tr>
            <td colspan="2" class="btn-center">
                <button type="submit" id="btn">SUBMIT</button>
            </td>
        </tr>
    </table>
</form>

<script src="script.js"></script>

</body>
</html>
